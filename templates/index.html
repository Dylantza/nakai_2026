<link rel="preconnect" href="https://fonts.googleapis.com">

<script>

    theme: {

<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100vw; height: 100vh; overflow: hidden;
    background: #000;
    -webkit-user-select: none; user-select: none;
    cursor: default;
  }

  @keyframes livepulse  { 0%,100%{opacity:1} 50%{opacity:.15} }
  @keyframes alertpulse { 0%,100%{opacity:1} 50%{opacity:.1}  }
  @keyframes sblink     { 0%,100%{opacity:1} 50%{opacity:.05} }

  .anim-live   { animation: livepulse 2.4s ease-in-out infinite; }
  .anim-alert  { animation: alertpulse 0.75s ease-in-out infinite; }
  .anim-blink  { animation: sblink 0.7s infinite; }

  /* D-pad / action buttons */
  .rov-btn {
    transition: background 0.07s, border-color 0.07s, transform 0.07s;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .rov-btn:hover  { background: rgba(255,255,255,0.07) !important; border-color: rgba(255,255,255,0.20) !important; }
  .rov-btn:active, .rov-btn.pressed {
    background: rgba(255,255,255,0.18) !important;
    border-color: rgba(255,255,255,0.45) !important;
    color: #fff !important;
    transform: scale(0.90);
  }

  /* Stop buttons */
  .rov-stop {
    transition: background 0.07s, border-color 0.07s, transform 0.07s;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .rov-stop:hover  { background: rgba(239,68,68,0.18) !important; border-color: rgba(239,68,68,0.45) !important; }
  .rov-stop:active, .rov-stop.pressed {
    background: rgba(239,68,68,0.45) !important;
    border-color: rgba(239,68,68,0.70) !important;
    color: #fff !important;
    transform: scale(0.90);
  }

  /* Brush active state */
  .brush-active {
    background: rgba(52,211,153,0.10) !important;
    border-color: rgba(52,211,153,0.35) !important;
    color: rgb(52,211,153) !important;
  }

  /* Track bars */
  .t-fill   { transition: width 0.18s ease; }
  .sp-fill  { transition: width 0.14s ease, left 0.14s ease; }
</style>
</head>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
const socket = io();
function sendCmd(cmd) { socket.emit('command', { cmd }); }

// ── CAN motor controls (W / A / S / D) ───────────────────────────
const held = new Set();
const priority = ['w','s','a','d'];
function pressDir(k)   { if (!held.has(k)) { held.add(k); resolve(); } }
function releaseDir(k) { held.delete(k); resolve(); }
function resolve() {
  for (const k of priority) { if (held.has(k)) { sendCmd(k); return; } }
  sendCmd('x');
}

function setDirVisual(dir) {
  ['btn-w','btn-s','btn-a','btn-d'].forEach(id =>
    document.getElementById(id).classList.remove('pressed'));
  const map = { FORWARD:'btn-w', REVERSE:'btn-s', LEFT:'btn-a', RIGHT:'btn-d' };
  if (map[dir]) document.getElementById(map[dir]).classList.add('pressed');
}

// ── Maneuver ESC controls (Arrow keys) ───────────────────────────
const manHeld = new Set();
const manPriority = ['man_w','man_s','man_a','man_d'];
function pressMan(k)   { if (!manHeld.has(k)) { manHeld.add(k); resolveMan(); } }
function releaseMan(k) { manHeld.delete(k); resolveMan(); }
function resolveMan() {
  for (const k of manPriority) { if (manHeld.has(k)) { sendCmd(k); return; } }
  sendCmd('man_x');
}

function setManVisual(dir) {
  ['btn-man-w','btn-man-s','btn-man-a','btn-man-d'].forEach(id =>
    document.getElementById(id).classList.remove('pressed'));
  const map = { FORWARD:'btn-man-w', REVERSE:'btn-man-s', LEFT:'btn-man-a', RIGHT:'btn-man-d' };
  if (map[dir]) document.getElementById(map[dir]).classList.add('pressed');
}

// ── Keyboard ──────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if      (['w','s','a','d'].includes(k)) { pressDir(k); e.preventDefault(); }
  else if (k === 'x')                      sendCmd('x');
  else if (k === '+' || k === '=')         sendCmd('+');
  else if (k === '-')                      sendCmd('-');
  else if (e.key === 'ArrowUp')           { pressMan('man_w'); e.preventDefault(); }
  else if (e.key === 'ArrowDown')         { pressMan('man_s'); e.preventDefault(); }
  else if (e.key === 'ArrowLeft')         { pressMan('man_a'); e.preventDefault(); }
  else if (e.key === 'ArrowRight')        { pressMan('man_d'); e.preventDefault(); }
  else if (k === '0')                      sendCmd('imp_stop');
  else if (k === 'b')                      sendCmd('brush');
});
document.addEventListener('keyup', e => {
  const k = e.key.toLowerCase();
  if      (['w','s','a','d'].includes(k)) releaseDir(k);
  else if (e.key === 'ArrowUp')    releaseMan('man_w');
  else if (e.key === 'ArrowDown')  releaseMan('man_s');
  else if (e.key === 'ArrowLeft')  releaseMan('man_a');
  else if (e.key === 'ArrowRight') releaseMan('man_d');
});

// ── Impeller split-fill helper ────────────────────────────────────
function setImpFill(id, pwr) {
  const el = document.getElementById(id);
  if (pwr > 0) {
    el.style.left       = '50%';
    el.style.width      = (pwr / 2) + '%';
    el.style.background = 'rgba(52,211,153,0.70)';
  } else if (pwr < 0) {
    const w = Math.abs(pwr) / 2;
    el.style.left       = (50 - w) + '%';
    el.style.width      = w + '%';
    el.style.background = 'rgba(96,165,250,0.80)';
  } else {
    el.style.width = '0%';
  }
}

// ── Direction icons ───────────────────────────────────────────────
const icons = { STOPPED:'■', FORWARD:'▲', REVERSE:'▼', LEFT:'◀', RIGHT:'▶' };
const dirColors = {
  FORWARD : 'text-emerald-400',
  REVERSE : 'text-blue-300',
  LEFT    : 'text-white/55',
  RIGHT   : 'text-white/55',
  STOPPED : 'text-white/32',
};

// ── State update ──────────────────────────────────────────────────
socket.on('state', s => {

  // Direction badge
  const badge = document.getElementById('dir-badge');
  badge.textContent = (icons[s.direction] || '?') + '\u00a0\u00a0' + s.direction;
  badge.className = 'font-sans text-[9px] font-semibold tracking-[3px] uppercase transition-colors duration-200 '
    + (dirColors[s.direction] || 'text-white/32');
  setDirVisual(s.direction);

  // Speed
  document.getElementById('spd-big').textContent     = s.speed;
  document.getElementById('spd-max-lbl').textContent = 'of ' + s.speed_max;
  const sp = (s.speed / s.speed_max * 100) + '%';
  document.getElementById('spd-bar').style.width  = sp;
  document.getElementById('spd-bar2').style.width = sp;
  document.getElementById('spd-val').textContent  = s.speed + ' / ' + s.speed_max;

  // Impeller
  const ap   = Math.abs(s.impeller_power);
  const ipEl = document.getElementById('imp-pwr');
  ipEl.textContent = s.impeller_power + '%';
  ipEl.className   = 'block font-mono text-5xl leading-none tracking-tight '
    + (ap > 0 ? 'text-blue-300/90' : 'text-white/20');
  document.getElementById('imp-pwm').textContent = 'PWM · ' + s.impeller_read_pwm;
  setImpFill('imp-bar',  s.impeller_power);
  setImpFill('imp-bar2', s.impeller_power);
  document.getElementById('imp-val').textContent = s.impeller_power + '%';

  // Power read
  const rdp    = Math.abs(s.impeller_read_power);
  const rdpBar = document.getElementById('rdp-bar');
  rdpBar.style.width      = rdp + '%';
  rdpBar.style.background = rdp > 50 ? 'rgba(248,113,113,0.75)' : 'rgba(255,255,255,0.35)';
  document.getElementById('rdp-val').textContent = s.impeller_read_power + '%';

  // Brush
  const bEl = document.getElementById('hud-brush');
  bEl.textContent = s.brush_on ? 'ON' : 'OFF';
  bEl.className   = 'font-mono text-[11px] ' + (s.brush_on ? 'text-emerald-400' : 'text-white/22');
  const bBtn = document.getElementById('brush-btn');
  if (s.brush_on) bBtn.classList.add('brush-active');
  else            bBtn.classList.remove('brush-active');

  // Water
  const wEl = document.getElementById('hud-water');
  const wOv = document.getElementById('water-alert');
  if (s.water_warning) {
    wEl.textContent = 'WARN'; wEl.className = 'font-mono text-[11px] text-red-400 anim-blink';
    wOv.classList.remove('hidden');
  } else {
    wEl.textContent = 'OK'; wEl.className = 'font-mono text-[11px] text-emerald-400';
    wOv.classList.add('hidden');
  }

  // Teensy
  const tc = document.getElementById('hud-teensy');
  tc.textContent = s.teensy_connected ? 'ON' : '---';
  tc.className   = 'font-mono text-[11px] ' + (s.teensy_connected ? 'text-emerald-400' : 'text-white/22');

  // Range
  const rv = document.getElementById('range-val');
  if (s.distance_mm > 0) {
    rv.textContent = s.distance_mm;
    rv.className   = 'block font-mono text-5xl leading-none tracking-tight '
      + (s.distance_mm > 500 ? 'text-emerald-400/90' : s.distance_mm > 200 ? 'text-amber-400/90' : 'text-red-400/90');
  } else {
    rv.textContent = '---';
    rv.className   = 'block font-mono text-5xl leading-none tracking-tight text-white/20';
  }

  // Maneuver
  const mdEl = document.getElementById('hud-man-dir');
  mdEl.textContent = s.maneuver_direction || 'STOPPED';
  mdEl.className   = 'font-mono text-[11px] '
    + (s.maneuver_direction !== 'STOPPED' ? 'text-emerald-400' : 'text-white/22');
  setManVisual(s.maneuver_direction || 'STOPPED');

  document.getElementById('hud-man-pwr').textContent = (s.maneuver_power ?? 50) + '%';

});
</script>
</body>
</html>
